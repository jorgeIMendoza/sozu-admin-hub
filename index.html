    <link rel="icon" type="image/png" href="/favicon-light.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://tzmhgfjmddkfyffkkmto.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://tzmhgfjmddkfyffkkmto.supabase.co" />
    
    <!-- Optimize CSS loading -->
    <link rel="preload" href="/src/index.css" as="style" fetchpriority="high" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="description" content="Panel de administración para gestión de proyectos inmobiliarios SOZU" />

    <meta property="og:title" content="SOZU Admin - Panel de Administración" />
    <meta property="og:description" content="Panel de administración para gestión de proyectos inmobiliarios SOZU" />

    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <style>
      /* Inline critical CSS for initial paint */
      #root-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: hsl(0 0% 98%);
      }
      @media (prefers-color-scheme: dark) {
        #root-loader {
          background: hsl(222.2 84% 4.9%);
        }
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid hsl(158 64% 38% / 0.2);
        border-top-color: hsl(158 64% 38%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* Optimize font rendering */
      * {
        font-display: swap;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="root-loader">
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
