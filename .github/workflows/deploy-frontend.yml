name: Deploy Frontend to Firebase

on:
  push:
    branches:
      - dev
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ github.ref == 'refs/heads/main' && secrets.FIREBASE_GCP_PRD || secrets.FIREBASE_GCP_DEV }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get secrets from Secret Manager
        id: gcp-secrets
        run: |
          PROJECT_ID=${{ github.ref == 'refs/heads/main' && 'sozu-admin-prd-001' || 'sozu-admin-dev' }}

          echo "=== Intentando extraer secretos del proyecto: $PROJECT_ID ==="

          VITE_SUPABASE_URL=$(gcloud secrets versions access latest --secret=VITE_SUPABASE_URL --project=$PROJECT_ID 2>&1)
          echo "VITE_SUPABASE_URL obtenido: $VITE_SUPABASE_URL"
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> $GITHUB_ENV

          VITE_SUPABASE_PUBLISHABLE_KEY=$(gcloud secrets versions access latest --secret=VITE_SUPABASE_PUBLISHABLE_KEY --project=$PROJECT_ID 2>&1)
          echo "VITE_SUPABASE_PUBLISHABLE_KEY obtenido (primeros 20 chars): ${VITE_SUPABASE_PUBLISHABLE_KEY:0:20}..."
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY" >> $GITHUB_ENV

          VITE_ENVIRONMENT=$(gcloud secrets versions access latest --secret=VITE_ENVIRONMENT --project=$PROJECT_ID 2>&1)
          echo "VITE_ENVIRONMENT obtenido: $VITE_ENVIRONMENT"
          echo "VITE_ENVIRONMENT=$VITE_ENVIRONMENT" >> $GITHUB_ENV

          VITE_N8N_WEBHOOK_BASE_URL=$(gcloud secrets versions access latest --secret=VITE_N8N_WEBHOOK_BASE_URL --project=$PROJECT_ID 2>&1)
          echo "VITE_N8N_WEBHOOK_BASE_URL obtenido: $VITE_N8N_WEBHOOK_BASE_URL"
          echo "VITE_N8N_WEBHOOK_BASE_URL=$VITE_N8N_WEBHOOK_BASE_URL" >> $GITHUB_ENV

          VITE_SUPABASE_PROJECT_ID=$(gcloud secrets versions access latest --secret=VITE_SUPABASE_PROJECT_ID --project=$PROJECT_ID 2>&1)
          echo "VITE_SUPABASE_PROJECT_ID obtenido: $VITE_SUPABASE_PROJECT_ID"
          echo "VITE_SUPABASE_PROJECT_ID=$VITE_SUPABASE_PROJECT_ID" >> $GITHUB_ENV

          echo "=== Secretos cargados en GITHUB_ENV ==="

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: ${{ github.ref == 'refs/heads/main' && secrets.FIREBASE_GCP_PRD || secrets.FIREBASE_GCP_DEV }}
          channelId: live
          projectId: ${{ github.ref == 'refs/heads/main' && 'sozu-admin-prd-001' || 'sozu-admin-dev' }}
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
