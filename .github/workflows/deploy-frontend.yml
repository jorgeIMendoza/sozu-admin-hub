name: Deploy Frontend to Firebase

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_GCP_DEV }}'

      - name: Get secrets from Secret Manager
        id: gcp-secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            VITE_SUPABASE_PUBLISHABLE_KEY/VITE_SUPABASE_PUBLISHABLE_KEY
            VITE_SUPABASE_URL/VITE_SUPABASE_URL
            VITE_ENVIRONMENT/VITE_ENVIRONMENT
            VITE_N8N_WEBHOOK_BASE_URL/VITE_N8N_WEBHOOK_BASE_URL
            VITE_SUPABASE_PROJECT_ID/VITE_SUPABASE_PROJECT_ID

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          VITE_ENVIRONMENT: ${{ steps.gcp-secrets.outputs.VITE_ENVIRONMENT }}
          VITE_SUPABASE_PROJECT_ID: ${{ steps.gcp-secrets.outputs.VITE_SUPABASE_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ steps.gcp-secrets.outputs.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ steps.gcp-secrets.outputs.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_N8N_WEBHOOK_BASE_URL: ${{ steps.gcp-secrets.outputs.VITE_N8N_WEBHOOK_BASE_URL }}

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_GCP_DEV }}'
          channelId: live
          projectId: ${{ github.ref == 'refs/heads/main' && 'sozu-admin-prd' || 'sozu-admin-dev' }}
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
