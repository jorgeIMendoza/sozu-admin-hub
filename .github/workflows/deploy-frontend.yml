name: Deploy Frontend to Firebase

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter (only on main/dev push)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        run: npm run lint --if-present

      - name: Build Frontend
        run: npm run build
        env:
          VITE_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
          VITE_SUPABASE_PROJECT_ID: ${{ github.ref == 'refs/heads/main' && 'tzmhgfjmddkfyffkkmto' || 'supabase-dev' }}
          VITE_SUPABASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://tzmhgfjmddkfyffkkmto.supabase.co' || 'https://supabase-dev.sozu.com' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_PRD_ANON_KEY || secrets.SUPABASE_DEV_ANON_KEY }}
          VITE_N8N_WEBHOOK_BASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://automatizacion-n8n.fbqqbe.easypanel.host/webhook' || 'https://n8n-dev.sozu.com/webhook' }}

      - name: Deploy to Firebase (only on main/dev push)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_GCP_DEV }}'
          channelId: live
          projectId: ${{ github.ref == 'refs/heads/main' && 'sozu-admin-prd' || 'sozu-admin-dev' }}
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build successful! Preview available once merged.'
            })
